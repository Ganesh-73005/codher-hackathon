version: '3.8'

services:
  # Backend API (Using MongoDB Atlas - No local MongoDB needed)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codher-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=${MONGO_URL}
      - DB_NAME=${DB_NAME}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ENVIRONMENT=${ENVIRONMENT}
      - DOMAIN=${DOMAIN}
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - codher-network

  # Frontend with Nginx (HTTP only)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codher-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - codher-network

networks:
  codher-network:
    driver: bridge

volumes:
  backend_uploads:
    driver: local
